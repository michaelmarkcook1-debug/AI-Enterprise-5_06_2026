name: CI

# Gate every PR + every push to main on:
#   - typecheck (npx tsc --noEmit)
#   - lint     (npm run lint)
#   - test     (vitest run — 450 tests, no DB needed; everything is mocked or pure)
#   - build    (next build — Prisma generate runs; no real DB connection)

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      # Dummy DATABASE_URL — Prisma generate needs the variable set to
      # validate the schema; it does NOT open a connection at generate /
      # build time. Tests don't touch a DB either (vitest suite is pure).
      DATABASE_URL: "postgresql://noop:noop@localhost:5432/noop?sslmode=verify-full"
      POSTGRES_URL: "postgresql://noop:noop@localhost:5432/noop?sslmode=verify-full"
      # Anthropic key check uses prefix + length — a placeholder satisfies
      # the static validator without enabling any real LLM call.
      ANTHROPIC_API_KEY: "sk-ant-ci-placeholder-not-a-real-key-only-static-validation"
      # SEC UA: same idea — passes the static validator (contains @).
      SEC_USER_AGENT: "AI Enterprise ci@example.com"
      ADMIN_API_OPEN: "1"
      # Suppress Next telemetry in CI.
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      # Lint is informational only for now — there are pre-existing
      # `@typescript-eslint/no-explicit-any` issues in older files that
      # we don't want to bundle into this CI bring-up commit. tsc +
      # tests + build catch the regressions that actually matter.
      # Future cleanup commit can flip this to fail-on-error.
      - name: Lint (informational)
        run: npm run lint
        continue-on-error: true

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Summary
        if: always()
        run: |
          echo "## CI summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Node: $(node -v)" >> "$GITHUB_STEP_SUMMARY"
          echo "npm:  $(npm -v)" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
